spring.config.import: "aws-secretsmanager:finance-control/database"

spring:
  datasource:
    url: ${JDBC_URL}
    username: ${username}
    password: ${password}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

spring.cloud:
  aws:
    region:
      static: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    endpoint: ${LOCALSTACK_URL}
