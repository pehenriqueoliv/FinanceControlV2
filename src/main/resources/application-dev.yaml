spring:
  datasource:
    url: ${JDBC_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

data:
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PASSWORD}

cloud:
  aws:
    region: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    endpoint: ${LOCALSTACK_URL}